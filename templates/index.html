<!DOCTYPE html>
<html>
<head>
    <title>AI Resume Analyzer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            margin: 0;
            padding: 0;
        }

        .container {
            width: 40%;
            margin: 100px auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1 {
            color: #333;
        }

        input[type="file"] {
            margin: 20px 0;
        }

        button {
            background: #4facfe;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #007bff;
        }

        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: gray;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🤖 AI Resume Analyzer</h1>
    <p>Upload your resume and get instant analysis</p>


    <form action="/upload" method="post" enctype="multipart/form-data">
        <input type="file" name="resume" multiple required>
        <br>
        <button type="submit">Analyze Resume(s)</button>
    </form>

    <div class="footer">
        Built with AI + ML
    </div>
</div>

</body>
</html>
