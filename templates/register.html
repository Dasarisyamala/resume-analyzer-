<!DOCTYPE html>
<html>
<head>
    <title>Resume Analyzer · Register</title>
    <style>
        :root {
            --bg: #080c1d;
            --panel: rgba(255,255,255,0.07);
            --accent: #4adbc4;
            --text: #f4f4fb;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            font-family: 'Space Grotesk', 'Segoe UI', sans-serif;
            background: radial-gradient(circle at top, #202b5c, var(--bg) 70%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 16px;
        }

        .card {
            width: min(460px, 100%);
            background: var(--panel);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 30px 70px rgba(6,10,28,0.50);
        }

        h1 {
            margin: 0 0 10px;
            font-size: 2rem;
        }

        p.subtitle {
            margin: 0 0 24px;
            color: rgba(255,255,255,0.75);
        }

        label {
            display: block;
            font-size: 0.9rem;
            margin-bottom: 6px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            margin-bottom: 16px;
            font-size: 1rem;
        }

        button {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #5a7ff8, #4adbc4);
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }

        .error {
            background: rgba(255, 97, 97, 0.18);
            color: #ffb3b3;
            padding: 10px 14px;
            border-radius: 12px;
            margin-bottom: 16px;
        }

        .alt-link {
            margin-top: 16px;
            text-align: center;
            font-size: 0.95rem;
        }

        .alt-link a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Create an account</h1>
        <p class="subtitle">Unlock the full Resume Analyzer experience.</p>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}

        <form method="post">
            <input type="hidden" name="next" value="{{ request.args.get('next', '') }}">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="you@company.com" required>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="At least 6 characters" required>

            <label for="confirm_password">Confirm password</label>
            <input type="password" id="confirm_password" name="confirm_password" placeholder="Repeat password" required>

            <button type="submit">Register</button>
        </form>

        <div class="alt-link">
            Already have an account? <a href="/login">Sign in</a>
        </div>
    </div>
</body>
</html>
